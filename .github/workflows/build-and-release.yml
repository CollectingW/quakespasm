name: Build and Publish Release
on: [push]
jobs:
  Compile-NRO:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build
        working-directory: ./
        run: |
          make -j32 -f Makefile.nx
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nx-nzp-nro
          path: |
            ./build/nx/nzportable.nro
            ./build/nx/nzportable.nacp
  Unify-and-Release:
    runs-on: ubuntu-latest
    needs: [Compile-NRO]
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Wait for GitHub to keep up..
        run: sleep 2s
        shell: bash
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./
      - name: Turn Artifacts into .ZIP archives
        run: |
          zip -r -j nx-nzp-nro.zip nx-nzp-nro/*
      - name: Generate Build Date
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d-%H-%M-%S')"
      - name: Delete Old Release
        uses: dev-drprasad/delete-tag-and-release@v0.2.1
        with:
          delete_release: true
          tag_name: bleeding-edge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: bleeding-edge
          release_name: Automated Release ${{ steps.date.outputs.date }}
          body: |
            This is a **bleeding edge** NZ:P Switch Emulator Edition release; stability is not guaranteed.

            To install:
            - Grab the `.ZIP` archive below.
            - Extract `nzportable.nro` into `switch/nzportable` on your Nintendo Switch (or your emulator's sdmc).
          draft: true
          prerelease: false
      - name: Upload NX Archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./nx-nzp-nro.zip
          asset_name: nx-nzp-nro.zip
          asset_content_type: application/zip
      - name: Publish Release
        uses: StuYarrow/publish-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          id: ${{ steps.create_release.outputs.id }}
